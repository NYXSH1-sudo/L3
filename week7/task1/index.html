<!DOCTYPE html>
<html>
<head>
    <title>Task 1</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <div class="col1">Column 1</div>
        <div class="col2">Column 2</div>
        <div class="col3">Column 3</div>
    </div>

    <div class="left">
        <p>A numbered list:</p>

        <ol>
            <li>Able</li>
            <li>Baker</li>
            <li>Charlie</li>
            <li>Delta</li>
            <li>Echo</li>
        </ol>
    </div>

    <div class="yellow">
        B
    </div>

    <div class="red">
        C
    </div>

    <div class="green">
        <p>An unnumbered list:</p>

        <ul>
            <li>Pounds</li>
            <li>Dollars</li>
            <li>Euro</li>
            <li>Yen</li>
            <li>Roubles</li>
        </ul>
    </div>

</div>

</body>
</html>
