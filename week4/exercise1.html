<!DOCTYPE html>
<html>
<head>
    <title>Image Formatting Example</title>
</head>
<body>

    <h2>Image Formatting Example</h2>

    <img src="image1.jpg" alt="Image 1" border="5">

    <br><br>

    
    <a href="image2.jpg" target="_blank">
        <img src="image2.jpg" alt="Image 2" width="100" height="100">
    </a>

    <br><br>

    
    <img src="image3.jpg" alt="Image 3" align="right">

    <p>
        Hey there! This is an example of an image aligned to the right. You can change the <
        <code>align</code> attribute from <b>right</b> to <b>left</b>.
    </p>

    <br clear="all">

    
    <img src="image4.png" alt="Image 4" hspace="50" vspace="50">

    <p>
       Hello NYX here!!
    </p>

</body>
</html>
