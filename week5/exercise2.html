<!DOCTYPE html>
<html>
<head>
    <title>HTML Form Test</title>
</head>
<body>

<center>

<form>

<table border="1" cellpadding="10" cellspacing="0">

<tr>
    <td colspan="2">
        <h2>HTML Form Test</h2>
    </td>
</tr>

<tr>
    <td>Name</td>
    <td><input type="text" name="name"></td>
</tr>

<tr>
    <td>Address</td>
    <td><input type="text" name="address"></td>
</tr>

<tr>
    <td>Email</td>
    <td><input type="email" name="email"></td>
</tr>

<tr>
    <td>Gender</td>
    <td>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female
    </td>
</tr>

<tr>
    <td>Hobbies</td>
    <td>
        <input type="checkbox" name="hobby">Sports
        <input type="checkbox" name="hobby">Movies
        <input type="checkbox" name="hobby">Travelling
    </td>
</tr>

<tr>
    <td>Country</td>
    <td>
        <select name="country">
            <option>Nepal</option>
            <option>India</option>
            <option>China</option>
            <option>USA</option>
            <option>Japan</option>
        </select>
    </td>
</tr>

<tr>
    <td>Message</td>
    <td>
        <textarea rows="8" cols="45"></textarea>
    </td>
</tr>

<tr>
    <td></td>
    <td>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </td>
</tr>

</table>

</form>

</center>

</body>
</html>
